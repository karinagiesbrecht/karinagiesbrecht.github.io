<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UVic Global Collaborations</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <div id="ui-container">
        <h1>University of Victoria</h1>
        <h2>Global Collaborations (2024-2025)</h2>

        <div id="view-toggles" style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button id="btn-map-view" class="modal-btn" style="padding: 6px 14px; font-size: 12px;">Map View</button>
            <button id="btn-table-view" class="modal-btn secondary" style="padding: 6px 14px; font-size: 12px;">Table
                View</button>
        </div>

        <div class="legend">
            <span class="legend-item"><span class="dot uvic"></span> Victoria, BC</span>
            <span class="legend-item"><span class="dot collab"></span> Collaborator</span>
        </div>
        <button id="back-btn" class="hidden">← Back to World View</button>
        <div id="tooltip" class="hidden">
            <strong id="tt-name"></strong><br>
            <span id="tt-count" style="color: var(--text-main); font-weight: bold;"></span> <span span
                style="color: var(--text-muted); font-size: 11px;">collaborations</span>
            <div id="tt-details" style="margin-top: 8px; font-size: 11px; color: var(--text-muted);"></div>
        </div>
    </div>

    <div id="map-container"></div>

    <!-- Table View Overlay -->
    <div id="country-table-view" class="hidden">
        <div class="table-container-inner"
            style="max-width: 900px; margin: 40px auto; background: var(--modal-bg); padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0, 39, 84, 0.1); border: 1px solid rgba(0, 115, 188, 0.2); max-height: 85vh; display: flex; flex-direction: column;">
            <h2
                style="color: var(--text-main); font-size: 20px; font-weight: 600; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px;">
                All Global Collaborations</h2>

            <div style="overflow-y: auto; flex-grow: 1;">
                <table id="full-country-table" style="width: 100%; border-collapse: collapse; font-size: 14px;">
                    <thead>
                        <tr>
                            <th
                                style="text-align: left; padding: 12px; border-bottom: 2px solid var(--border-color); color: var(--btn-primary); position: sticky; top: 0; background: var(--modal-bg);">
                                Country</th>
                            <th
                                style="text-align: right; padding: 12px; border-bottom: 2px solid var(--border-color); color: var(--btn-primary); position: sticky; top: 0; background: var(--modal-bg);">
                                Institutions</th>
                            <th
                                style="text-align: right; padding: 12px; border-bottom: 2px solid var(--border-color); color: var(--btn-primary); position: sticky; top: 0; background: var(--modal-bg);">
                                Publications</th>
                            <th
                                style="text-align: right; padding: 12px; border-bottom: 2px solid var(--border-color); position: sticky; top: 0; background: var(--modal-bg);">
                            </th>
                        </tr>
                    </thead>
                    <tbody id="full-country-tbody">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Universal Details Modal -->
    <div id="modal-overlay" class="hidden">
        <div id="modal-content">
            <div class="modal-header">
                <h2 id="modal-title" style="margin: 0; padding: 0;">Title</h2>
                <button id="modal-close">&times;</button>
            </div>

            <div id="modal-body-overview">
                <p id="modal-subtitle" style="font-size: 14px; color: var(--text-muted); margin-top: 5px;"></p>
                <div id="modal-stats" style="margin: 15px 0; font-size: 14px; line-height: 1.5;"></div>

                <div id="modal-actions" style="display: flex; gap: 10px; margin-top: 20px;">
                    <!-- Buttons injected via JS based on context -->
                </div>
            </div>

            <div id="modal-body-list" class="hidden">
                <div
                    style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; margin-top: 10px;">
                    <h3 style="margin: 0; font-size: 15px;">All Institutions</h3>
                    <button id="modal-back-btn" class="modal-btn secondary tooltip-action-btn" style="margin: 0;">&larr;
                        Back</button>
                </div>
                <div id="modal-list-container">
                    <table id="modal-table">
                        <thead>
                            <tr>
                                <th>Institution</th>
                                <th style="text-align: right;">Count</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="modal-tbody">
                            <!-- rows prepopulated by js -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- D3 and TopoJSON -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson-client@3"></script>
    <script src="script.js"></script>
</body>

</html>
